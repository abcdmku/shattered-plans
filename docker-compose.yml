services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx1024m}
      SP_WEB_PORT: 8080
      SP_TCP_PORT: 43594
    expose:
      - "8080"
    ports:
      - "${SP_TCP_PORT:-43594}:43594"
    restart: unless-stopped

  frontend:
    build:
      context: ./src/app
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    restart: unless-stopped
